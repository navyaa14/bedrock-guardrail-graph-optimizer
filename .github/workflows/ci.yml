name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pandas-stubs types-PyYAML

      - name: Run test suite
        run: pytest -q

      - name: Plan-integrity regression test (Part 1.2 -- must never regress)
        run: pytest -q tests/test_plan_integrity.py -v

      - name: Type check with mypy
        run: mypy --config-file=mypy.ini src

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t bedrock-guardrail-graph-optimizer .
