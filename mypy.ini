[mypy]
python_version = 3.11
mypy_path = src
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
no_implicit_optional = True
check_untyped_defs = True
disallow_untyped_defs = False
exclude = (tests/|outputs/|data/)

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-networkx.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True
